<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Financeiro</title>
    <meta name="description" content="Controle financeiro inteligente na palma da mão" />
    <meta name="theme-color" content="#2563EB" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Apple / iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Meu Financeiro" />

    <!-- Android / PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Camada 1: Detecção de tokens de recuperação ANTES do React carregar
      (function() {
        const hash = window.location.hash;
        const searchParams = new URLSearchParams(window.location.search);
        
        const hasRecoveryToken = 
          hash.includes('type=recovery') || 
          hash.includes('access_token') ||
          searchParams.get('type') === 'recovery' ||
          searchParams.get('token');
        
        // Se houver tokens de recuperação e não estiver em /reset-password, redirecionar
        if (hasRecoveryToken && window.location.pathname !== '/reset-password') {
          console.log('[Fallback] Tokens de recuperação detectados, redirecionando para /reset-password');
          const redirectPath = '/reset-password' + hash + (window.location.search || '');
          window.location.replace(redirectPath);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

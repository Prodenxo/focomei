server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Config injetada no startup (Easypanel Environment)
    location = /env-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /legal.css {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Páginas legais (HTML estático em public/ — Google OAuth; sem passar pelo Expo Router)
    location ~ ^/privacidade/?$ {
        default_type text/html;
        try_files /privacidade.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location ~ ^/termos/?$ {
        default_type text/html;
        try_files /termos.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # HTML do SPA: nunca cachear (evita index antigo apontando para chunks 404 = tela branca)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Cache longo só para assets com hash no nome (bundles Expo)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA Expo: rotas do app (login, dashboard, etc.) — nunca cachear HTML servido
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri.html $uri/ /index.html;
    }
}

# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

Todas as mudanças relevantes deste projeto serão documentadas neste arquivo.

Formato baseado em [Keep a Changelog](https://keepachangelog.com/pt-BR/1.1.0/),
e o projeto adere a [Conventional Commits](https://www.conventionalcommits.org/pt-br/).

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%d/%m/%Y") }}
{% else -%}
## [Não lançado]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits -%}
- {{ commit.message | upper_first | trim }}{% if commit.breaking %} **(BREAKING)**{% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Remove emojis no início ("✨ feat: ..." → "feat: ...")
commit_preprocessors = [
    { pattern = '^[^\w\s(]+\s+', replace = "" },
]

commit_parsers = [
    { message = "^feat",     group = "Funcionalidades" },
    { message = "^fix",      group = "Correções" },
    { message = "^perf",     group = "Performance" },
    { message = "^refactor", group = "Refatorações" },
    { message = "^doc",      group = "Documentação" },
    { message = "^ux",       group = "UX" },
    { message = "^style",    group = "Estilo" },
    { message = "^test",     group = "Testes" },
    { message = "^build",    skip  = true },
    { message = "^ci",       skip  = true },
    { message = "^chore",    skip  = true },
    { message = "^Merge",    skip  = true },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
